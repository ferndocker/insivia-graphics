const TOKEN = ''; // Add your GitHub Personal Access Token here

const REPO  = 'content-strategy-map';

const log = (msg, cls='info') => {
  document.getElementById('log').innerHTML += '<p class="'+cls+'">'+msg+'</p>';
};

const pushFile = async (path, b64content, message) => {
  const url = 'https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+path;
  // Check if file exists (to get sha for update)
  let sha = undefined;
  try {
    const chk = await fetch(url, { headers: {'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json'} });
    if (chk.ok) { const d = await chk.json(); sha = d.sha; }
  } catch(e) {}

  const body = { message, content: b64content };
  if (sha) body.sha = sha;

  const res = await fetch(url, {
    method: 'PUT',
    headers: {'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  return { ok: res.ok, status: res.status, url: data.content?.html_url, message: data.message };
};
